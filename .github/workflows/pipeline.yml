name: CI/CD Pipeline - Build & Deploy

on:
  workflow_dispatch:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JAR with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Verify JAR
        run: ls target/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          source: "target/*.jar"
          target: "covid-app/target/"

      - name: Final Deployment Commands
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |

            set -e
            echo "🚀 Connected to EC2"

            # =========================
            # Install Docker
            # =========================
            if ! command -v docker &> /dev/null
            then
              echo "🐳 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            else
              echo "✅ Docker already installed"
            fi

            # =========================
            # Install Docker Compose (manual - stable)
            # =========================
            if ! command -v docker-compose &> /dev/null
            then
              echo "📦 Installing Docker Compose..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            else
              echo "✅ Docker Compose already installed"
            fi

            # Verify
            sudo docker --version
            sudo docker-compose --version

            # =========================
            # Fix Docker permissions
            # =========================
            sudo usermod -aG docker ubuntu
            newgrp docker || true

            # =========================
            # Go to project directory
            # =========================
            mkdir -p COVID-PROJECT
            cd COVID-PROJECT

            # =========================
            # Pull latest code
            # =========================
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull origin main
            fi

            # =========================
            # Check files
            # =========================
            echo "📂 Files in project:"
            ls -l

            # =========================
            # Create .env file (IMPORTANT: no indentation)
            # =========================
            echo "⚙️ Creating .env file..."
            cat <<EOF > .env
            DB_HOST=mysql
            DB_PORT=3306
            DB_USERNAME=root
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF

            # =========================
            # Stop old containers
            # =========================
            echo "🧹 Cleaning up old containers..."

            sudo docker rm -f mysql-db || true
            sudo docker rm -f covid19-backend || true
            sudo docker rm -f covid-frontend || true

            sudo docker-compose down || true

            # =========================
            # Build & Start
            # =========================
            echo "🚀 Starting application..."
            sudo docker-compose up -d --build

            # =========================
            # Verify
            # =========================
            sudo docker ps -a

            # =========================
            # Logs
            # =========================
            sudo docker-compose logs --tail=50
