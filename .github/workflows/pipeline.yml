name: CI/CD Pipeline - Build & Deploy

on:
  push:
    branches:
      - main

jobs:

  # =========================
  # 🏗️ BUILD JOB (GitHub Runner)
  # =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build JAR with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Verify JAR
        run: ls target/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


  # =========================
  # 🚀 DEPLOY JOB (EC2)
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build   # 👈 ensures build runs first

    steps:
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |

            set -e
            echo "🚀 Connected to EC2"

            # -------------------------------
            # Install Docker if not present
            # -------------------------------
            if ! command -v docker &> /dev/null
            then
              echo "🐳 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            else
              echo "✅ Docker already installed"
            fi

            # -------------------------------
            # Prepare app directory
            # -------------------------------
            mkdir -p covid-app
            cd covid-app

            # -------------------------------
            # Clean old files
            # -------------------------------
            rm -rf target
            mkdir target

            # -------------------------------
            # NOTE: JAR will be copied manually below
            # -------------------------------

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          source: "target/*.jar"
          target: "covid-app/target/"

      - name: Final Deployment Commands
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |

            set -e
            echo "🚀 Connected to EC2"

            # -------------------------------
            # Install Docker if not present
            # -------------------------------
            if ! command -v docker &> /dev/null
            then
              echo "🐳 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            else
              echo "✅ Docker already installed"
            fi

            # -------------------------------
            # Prepare app directory
            # -------------------------------
            mkdir -p covid-app
            cd covid-app

            # -------------------------------
            # Clean old files
            # -------------------------------
            rm -rf target
            mkdir target

            # -------------------------------
            # NOTE: JAR will be copied manually below
            # -------------------------------

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          source: "target/*.jar"
          target: "covid-app/target/"

      - name: Final Deployment Commands
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |

            set -e

            cd covid-app

            # 🔥 FIX: JAR is already copied by SCP → just use it
            echo "📂 Checking target folder..."
            ls -l target/

            # Copy jar to root for Docker
            cp target/*.jar app.jar

            echo "📂 Root files:"
            ls -l

            echo "🧹 Cleaning old container..."
            docker stop covid19-backend || true
            docker rm covid19-backend || true
            docker rmi covid19-backend:1.0 || true

            echo "🔨 Building Docker image..."
            docker build -t covid19-backend:1.0 .

            echo "🚀 Running container..."
            docker run -d -p 8080:8080 \
              -e DB_HOST=localhost \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
              -e MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
              --name covid19-backend covid19-backend:1.0

            docker ps -a
            docker logs covid19-backend || true
