name: Deploy to EC2 (Robust Docker Deploy)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.IP }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |

            set -e  # ❗ fail fast (VERY IMPORTANT)

            echo "🚀 Connected to EC2"

            # -------------------------------
            # Fix Docker permission (important)
            # -------------------------------
            sudo usermod -aG docker ubuntu || true

            # -------------------------------
            # Install Docker if not installed
            # -------------------------------
            if ! command -v docker &> /dev/null
            then
              echo "🐳 Installing Docker..."
              sudo apt update -y
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
            else
              echo "✅ Docker already installed"
            fi

            # -------------------------------
            # Clone or update repo
            # -------------------------------
            if [ ! -d "covid-app" ]; then
              echo "📦 Cloning repo..."
              git clone https://github.com/${{ github.repository }} covid-app
            fi

            cd covid-app
            git pull origin main

            # -------------------------------
            # Stop & remove old container
            # -------------------------------
            echo "🧹 Cleaning old container..."
            docker stop covid19-backend || true
            docker rm covid19-backend || true

            # -------------------------------
            # Remove old image (optional)
            # -------------------------------
            docker rmi covid19-backend:1.0 || true

            # -------------------------------
            # Build Docker image
            # -------------------------------
            echo "🔨 Building Docker image..."
            docker build -t covid19-backend:1.0 .

            # -------------------------------
            # Run container (FIXED DB_HOST)
            # -------------------------------
            echo "🚀 Running container..."

            docker run -d -p 8080:8080 \
              -e DB_HOST=localhost \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
              -e MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
              --name covid19-backend covid19-backend:1.0

            # -------------------------------
            # Debug: Check container status
            # -------------------------------
            echo "📊 Checking container status..."
            docker ps -a

            # -------------------------------
            # Debug: Show logs if failed
            # -------------------------------
            echo "📜 Container logs:"
            docker logs covid19-backend || true

            echo "✅ Deployment Completed"
